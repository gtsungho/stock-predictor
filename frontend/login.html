<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Stock Predictor - 로그인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 40px 30px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 13px;
            color: #a0a0b0;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
            -webkit-appearance: none;
        }
        input:focus {
            border-color: #00d4ff;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099bb);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        .error {
            color: #ff5252;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Stock Predictor</h1>
        <p class="subtitle">비밀번호를 입력하세요</p>
        <div>
            <input type="password" id="password" placeholder="비밀번호" autofocus
                   onkeypress="if(event.key==='Enter')login()">
            <button type="button" onclick="login()">로그인</button>
        </div>
        <p id="error" class="error">비밀번호가 틀렸습니다.</p>
    </div>
    <script>
        document.getElementById('password').focus();

        function login() {
            var pw = document.getElementById('password').value;
            if (!pw) {
                document.getElementById('error').textContent = '비밀번호를 입력하세요.';
                document.getElementById('error').style.display = 'block';
                return;
            }

            var btn = document.querySelector('button');
            btn.textContent = '로그인 중...';
            btn.disabled = true;

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        window.location.replace('/');
                    } else {
                        document.getElementById('error').textContent = '비밀번호가 틀렸습니다.';
                        document.getElementById('error').style.display = 'block';
                        btn.textContent = '로그인';
                        btn.disabled = false;
                    }
                }
            };
            xhr.onerror = function() {
                document.getElementById('error').textContent = '서버 연결 실패';
                document.getElementById('error').style.display = 'block';
                btn.textContent = '로그인';
                btn.disabled = false;
            };
            xhr.send(JSON.stringify({password: pw}));
        }
    </script>
</body>
</html>

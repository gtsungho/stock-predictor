<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stock Predictor</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 헤더 -->
        <header class="header">
            <h1>Stock Predictor</h1>
            <p class="subtitle">NASDAQ / AMEX AI 분석</p>
        </header>

        <!-- 컨트롤 패널 -->
        <div class="control-panel">
            <button id="btn-analyze" class="btn-primary" onclick="startAnalysis()">
                분석 시작
            </button>
            <button id="btn-refresh" class="btn-secondary" onclick="loadResults()">
                결과 새로고침
            </button>
            <div id="search-box" class="search-box">
                <input type="text" id="search-ticker" placeholder="종목 검색 (예: AAPL)"
                       onkeypress="if(event.key==='Enter') searchStock()">
                <button onclick="searchStock()">검색</button>
            </div>
        </div>

        <!-- 진행 상태 -->
        <div id="progress-section" class="progress-section hidden">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="progress-text">준비 중...</p>
        </div>

        <!-- 요약 카드 -->
        <div id="summary-section" class="summary-section hidden">
            <div class="summary-cards">
                <div class="summary-card">
                    <span class="summary-label">분석 종목</span>
                    <span id="total-analyzed" class="summary-value">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">추천 종목</span>
                    <span id="total-qualified" class="summary-value">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">분석 시간</span>
                    <span id="elapsed-time" class="summary-value">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">마지막 분석</span>
                    <span id="last-update" class="summary-value">-</span>
                </div>
            </div>
        </div>

        <!-- 필터 -->
        <div id="filter-section" class="filter-section hidden">
            <select id="filter-grade" onchange="filterResults()">
                <option value="all">전체 등급</option>
                <option value="S">S등급</option>
                <option value="A">A등급</option>
                <option value="B">B등급</option>
            </select>
            <select id="filter-risk" onchange="filterResults()">
                <option value="all">전체 리스크</option>
                <option value="낮음">낮음</option>
                <option value="보통">보통</option>
                <option value="높음">높음</option>
            </select>
            <select id="sort-by" onchange="sortResults()">
                <option value="score">점수순</option>
                <option value="prob1d">1일 확률순</option>
                <option value="prob5d">5일 확률순</option>
            </select>
        </div>

        <!-- 종목 리스트 -->
        <div id="stock-list" class="stock-list">
            <div class="empty-state">
                <p>분석 결과가 없습니다.</p>
                <p>상단의 "분석 시작" 버튼을 눌러주세요.</p>
            </div>
        </div>

        <!-- 종목 상세 모달 -->
        <div id="modal" class="modal hidden" onclick="if(event.target===this)closeModal()">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-ticker"></h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>

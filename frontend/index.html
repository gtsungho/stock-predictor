<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stock Predictor</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>Stock Predictor</h1>
            <p class="subtitle">AI 매수 추천 &amp; 매매 전략</p>
        </header>

        <div class="control-panel">
            <button id="btn-analyze" class="btn-primary" onclick="startAnalysis()">
                종목 스캔 시작
            </button>
            <button id="btn-refresh" class="btn-secondary" onclick="loadResults()">
                새로고침
            </button>
        </div>

        <!-- 진행 상태 -->
        <div id="progress-section" class="progress-section hidden">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="progress-text">준비 중...</p>
        </div>

        <!-- 요약 -->
        <div id="summary-section" class="summary-section hidden">
            <div class="summary-cards">
                <div class="summary-card">
                    <span class="summary-label">스캔 종목</span>
                    <span id="total-analyzed" class="summary-value">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">매수 추천</span>
                    <span id="total-qualified" class="summary-value highlight">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">분석 시간</span>
                    <span id="elapsed-time" class="summary-value">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">업데이트</span>
                    <span id="last-update" class="summary-value">-</span>
                </div>
            </div>
        </div>

        <!-- 필터 -->
        <div id="filter-section" class="filter-section hidden">
            <select id="filter-grade" onchange="filterResults()">
                <option value="all">전체 등급</option>
                <option value="S">S 강력매수</option>
                <option value="A">A 매수</option>
                <option value="B">B 관심</option>
            </select>
            <select id="filter-strategy" onchange="filterResults()">
                <option value="all">전체 전략</option>
                <option value="단타">단타 (당일)</option>
                <option value="스윙">스윙 (3~5일)</option>
                <option value="단기 보유">단기 보유</option>
            </select>
            <select id="sort-by" onchange="sortResults()">
                <option value="score">점수순</option>
                <option value="target5d">목표수익순</option>
                <option value="rr">리워드/리스크순</option>
            </select>
        </div>

        <!-- 종목 리스트 -->
        <div id="stock-list" class="stock-list">
            <div class="empty-state">
                <p>아직 분석 결과가 없습니다.</p>
                <p>"종목 스캔 시작" 버튼을 누르면</p>
                <p>AI가 자동으로 매수할 종목을 찾아줍니다.</p>
            </div>
        </div>

        <!-- 상세 모달 -->
        <div id="modal" class="modal hidden" onclick="if(event.target===this)closeModal()">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-ticker"></h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>

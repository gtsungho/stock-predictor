<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stock Predictor</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>Stock Predictor</h1>
            <p class="subtitle">AI 매수 추천 &amp; 매매 전략</p>
        </header>

        <div class="control-panel">
            <button id="btn-analyze" class="btn-primary" onclick="startAnalysis()">
                종목 스캔 시작
            </button>
        </div>

        <!-- 검색 -->
        <div class="search-panel">
            <input type="text" id="search-ticker" placeholder="종목 검색 (예: AAPL, TSLA)"
                   onkeypress="if(event.key==='Enter') searchStock()">
            <button onclick="searchStock()">분석</button>
        </div>

        <!-- 진행 상태 -->
        <div id="progress-section" class="progress-section hidden">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="progress-text">준비 중...</p>
        </div>

        <!-- 요약 -->
        <div id="summary-section" class="summary-section hidden">
            <div class="summary-cards">
                <div class="summary-card">
                    <span class="summary-label">스캔 종목</span>
                    <span id="total-analyzed" class="summary-value">-</span>
                    <span id="stock-source" class="summary-sub"></span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">분석 시간</span>
                    <span id="elapsed-time" class="summary-value">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">업데이트</span>
                    <span id="last-update" class="summary-value">-</span>
                </div>
            </div>
        </div>

        <!-- 4탭 -->
        <div id="tab-section" class="tab-section hidden">
            <div class="tab-bar">
                <button class="tab active" data-tab="top20" onclick="switchTab('top20')">종합 TOP</button>
                <button class="tab" data-tab="bluechip" onclick="switchTab('bluechip')">우량주</button>
                <button class="tab" data-tab="gainers" onclick="switchTab('gainers')">급등주</button>
                <button class="tab" data-tab="volume" onclick="switchTab('volume')">거래량</button>
            </div>
        </div>

        <!-- 종목 리스트 -->
        <div id="stock-list" class="stock-list">
            <div class="empty-state">
                <p>아직 분석 결과가 없습니다.</p>
                <p>"종목 스캔 시작" 버튼을 누르면</p>
                <p>AI가 자동으로 매수할 종목을 찾아줍니다.</p>
            </div>
        </div>

        <!-- 상세 모달 -->
        <div id="modal" class="modal hidden" onclick="if(event.target===this)closeModal()">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-ticker"></h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
